version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: jobconnect_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jobconnect-network

  mongodb:
    image: mongo:7.0
    container_name: jobconnect_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: jobconnect
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jobconnect-network

volumes:
  redis_data:
  mongodb_data:

networks:
  jobconnect-network:
    driver: bridge
